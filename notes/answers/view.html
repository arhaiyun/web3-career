<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>参考答案 · Web3 Career OS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #f4f5f7;
        --surface: #fff;
        --ink: #1a2332;
        --muted: #5c6678;
        --line: #dde1e8;
        --green: #2d6a4f;
        --blue: #3d5a80;
        --radius: 8px;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        background: var(--bg);
        color: var(--ink);
        font-family: "IBM Plex Sans", system-ui, sans-serif;
        font-size: 15px;
        line-height: 1.6;
      }
      .bar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        flex-wrap: wrap;
        padding: 12px 20px;
        background: var(--surface);
        border-bottom: 1px solid var(--line);
        position: sticky;
        top: 0;
        z-index: 10;
      }
      .bar a {
        color: var(--blue);
        text-decoration: none;
        font-size: 0.88rem;
      }
      .bar a:hover { text-decoration: underline; }
      .wrap {
        max-width: 860px;
        margin: 0 auto;
        padding: 28px 20px 64px;
      }
      .article {
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: var(--radius);
        padding: 28px 32px;
        overflow-x: auto;
      }
      .loading, .error {
        text-align: center;
        color: var(--muted);
        padding: 48px 20px;
      }
      .error { color: #9b4422; }
      /* Markdown 排版 */
      .article h1 { font-size: 1.5rem; margin: 0 0 16px; }
      .article h2 {
        font-size: 1.15rem;
        margin: 28px 0 12px;
        padding-bottom: 6px;
        border-bottom: 1px solid var(--line);
      }
      .article h3 { font-size: 1rem; margin: 20px 0 8px; }
      .article h4 { font-size: 0.92rem; margin: 16px 0 6px; color: var(--muted); }
      .article p { margin: 0 0 12px; }
      .article ul, .article ol { margin: 0 0 14px; padding-left: 22px; }
      .article li { margin-bottom: 4px; }
      .article table {
        width: 100%;
        border-collapse: collapse;
        font-size: 0.88rem;
        margin: 12px 0 16px;
      }
      .article th, .article td {
        border: 1px solid var(--line);
        padding: 8px 10px;
        text-align: left;
      }
      .article th { background: var(--bg); }
      .article code {
        font-family: ui-monospace, monospace;
        font-size: 0.86em;
        background: var(--bg);
        padding: 2px 6px;
        border-radius: 4px;
      }
      .article pre {
        background: #1a2332;
        color: #e8eef5;
        padding: 14px 16px;
        border-radius: var(--radius);
        overflow-x: auto;
        font-size: 0.82rem;
        line-height: 1.45;
      }
      .article pre code { background: none; padding: 0; color: inherit; }
      .article blockquote {
        margin: 12px 0;
        padding: 10px 14px;
        border-left: 3px solid var(--green);
        background: #e8f2ec;
        color: var(--ink);
      }
      .article hr { border: none; border-top: 1px solid var(--line); margin: 24px 0; }
      .article a { color: var(--blue); }
      .mermaid {
        margin: 16px 0;
        padding: 16px;
        background: var(--bg);
        border: 1px solid var(--line);
        border-radius: var(--radius);
        overflow-x: auto;
        text-align: center;
      }
      .mermaid-fallback {
        font-family: ui-monospace, monospace;
        font-size: 0.78rem;
        white-space: pre-wrap;
        color: var(--muted);
        text-align: left;
      }
    </style>
  </head>
  <body>
    <header class="bar">
      <span id="doc-title">参考答案</span>
      <nav>
        <a href="../../index.html">工作台</a>
        <a href="index.html">答案索引</a>
        <a id="raw-link" href="#">下载 Markdown</a>
      </nav>
    </header>
    <div class="wrap">
      <div id="content" class="loading">正在加载…</div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
    <script>
      const params = new URLSearchParams(location.search);
      const file = params.get("f") || "";
      const contentEl = document.getElementById("content");
      const rawLink = document.getElementById("raw-link");

      if (!file || file.includes("..") || !/^[a-z0-9-]+\/[a-z0-9-]+\.md$/.test(file)) {
        contentEl.className = "error";
        contentEl.textContent = "无效的文件参数。";
      } else {
        rawLink.href = file;
        fetch(file)
          .then((r) => {
            if (!r.ok) throw new Error("文件不存在");
            return r.text();
          })
          .then(renderMarkdown)
          .catch((e) => {
            contentEl.className = "error";
            contentEl.textContent = "加载失败：" + e.message;
          });
      }

      function renderMarkdown(md) {
        const blocks = [];
        let idx = 0;
        const tokenized = md.replace(/```mermaid\n([\s\S]*?)```/g, (_, code) => {
          const id = "mermaid-" + idx++;
          blocks.push({ id, code: code.trim() });
          return '<div class="mermaid" id="' + id + '"></div>';
        });

        marked.setOptions({ gfm: true, breaks: false });
        const html = marked.parse(tokenized);

        contentEl.className = "article";
        contentEl.innerHTML = html;

        const h1 = contentEl.querySelector("h1");
        if (h1) document.getElementById("doc-title").textContent = h1.textContent;

        mermaid.initialize({ startOnLoad: false, theme: "neutral", securityLevel: "loose" });
        blocks.forEach(async ({ id, code }) => {
          const el = document.getElementById(id);
          try {
            const { svg } = await mermaid.render(id + "-svg", code);
            el.innerHTML = svg;
          } catch {
            el.innerHTML = '<pre class="mermaid-fallback">' + code + "</pre>";
          }
        });
      }
    </script>
  </body>
</html>
