<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Demo 02 · Editorial Brief</title>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;600&family=Newsreader:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet" />
    <style>
      :root {
        --bg: #f4efe6;
        --paper: #fffdf8;
        --ink: #1a1510;
        --muted: #6a5f52;
        --accent: #c45c26;
        --line: #ddd4c6;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        background: var(--bg);
        color: var(--ink);
        font-family: "Newsreader", Georgia, serif;
        font-size: 17px;
        line-height: 1.65;
      }
      .page { max-width: 1040px; margin: 0 auto; padding: 40px 24px 72px; }
      .masthead {
        display: flex;
        justify-content: space-between;
        align-items: flex-end;
        border-bottom: 3px double var(--ink);
        padding-bottom: 16px;
        margin-bottom: 32px;
        gap: 16px;
        flex-wrap: wrap;
      }
      .masthead h1 {
        font-family: "Fraunces", Georgia, serif;
        font-size: clamp(2rem, 5vw, 3.2rem);
        margin: 0;
        line-height: 1.05;
        font-weight: 600;
      }
      .meta { font-size: 0.85rem; color: var(--muted); text-align: right; }
      .meta a { color: var(--accent); }
      .lede {
        font-size: 1.2rem;
        font-style: italic;
        color: var(--muted);
        max-width: 62ch;
        margin: 0 0 28px;
      }
      .columns {
        display: grid;
        grid-template-columns: 2fr 1fr;
        gap: 32px;
        margin-bottom: 36px;
      }
      @media (max-width: 820px) { .columns { grid-template-columns: 1fr; } }
      .paper {
        background: var(--paper);
        border: 1px solid var(--line);
        padding: 24px 28px;
        box-shadow: 0 12px 40px rgba(26, 21, 16, 0.06);
      }
      .kicker {
        font-size: 0.72rem;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: var(--accent);
        margin-bottom: 8px;
      }
      .sidebar h2, .main h2 {
        font-family: "Fraunces", Georgia, serif;
        font-size: 1.35rem;
        margin: 0 0 14px;
      }
      .progress-ring {
        width: 120px;
        height: 120px;
        border-radius: 50%;
        border: 8px solid var(--line);
        border-top-color: var(--accent);
        display: grid;
        place-items: center;
        margin: 8px 0 20px;
        font-family: "Fraunces", Georgia, serif;
        font-size: 1.8rem;
      }
      .role-list { list-style: none; padding: 0; margin: 0; }
      .role-list li {
        padding: 8px 0;
        border-bottom: 1px solid var(--line);
        font-size: 0.95rem;
      }
      .track-nav {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-bottom: 20px;
      }
      .track-nav button {
        font-family: "Newsreader", Georgia, serif;
        background: transparent;
        border: 1px solid var(--line);
        padding: 8px 14px;
        cursor: pointer;
        color: var(--muted);
      }
      .track-nav button.is-active {
        background: var(--ink);
        color: var(--paper);
        border-color: var(--ink);
      }
      .module-card {
        padding: 18px 0;
        border-bottom: 1px solid var(--line);
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 12px;
        align-items: start;
      }
      .module-card h3 { margin: 0 0 6px; font-size: 1.05rem; font-weight: 600; }
      .module-card p { margin: 0; color: var(--muted); font-size: 0.95rem; }
      .pill {
        font-family: "Newsreader", Georgia, serif;
        font-size: 0.78rem;
        border: 1px solid var(--line);
        background: var(--bg);
        padding: 6px 12px;
        cursor: pointer;
        white-space: nowrap;
      }
      .pill.done { background: var(--ink); color: var(--paper); }
      .pill.doing { border-color: var(--accent); color: var(--accent); }
      .essay textarea {
        width: 100%;
        min-height: 140px;
        border: none;
        border-bottom: 1px solid var(--line);
        background: transparent;
        font-family: "Newsreader", Georgia, serif;
        font-size: 1rem;
        padding: 8px 0;
        resize: vertical;
      }
      .essay-actions { margin-top: 16px; display: flex; gap: 12px; flex-wrap: wrap; }
      .btn {
        font-family: "Newsreader", Georgia, serif;
        background: var(--accent);
        color: white;
        border: none;
        padding: 10px 18px;
        cursor: pointer;
        font-size: 0.9rem;
      }
      .btn.ghost { background: transparent; color: var(--muted); border: 1px solid var(--line); }
      .review {
        margin-top: 18px;
        padding-top: 16px;
        border-top: 1px solid var(--line);
        font-style: italic;
        color: var(--muted);
      }
      .review strong { color: var(--accent); font-style: normal; }
    </style>
  </head>
  <body>
    <div class="page" id="app">Loading brief…</div>
    <script type="module">
      import {
        loadPlan, loadProgress, saveProgress, escapeHtml,
        calculateOverallProgress, calculateTrackProgress, getNextModule,
        moduleKey, statusLabels, scoreReflection, activeModule,
      } from "./demo-core.mjs";

      let plan, activeTrackId, progress = loadProgress(), reflection = "", feedback = null;

      function cycleStatus(trackId, moduleId) {
        const key = moduleKey(trackId, moduleId);
        const cycle = ["todo", "doing", "done"];
        progress = { ...progress, [key]: cycle[(cycle.indexOf(progress[key] || "todo") + 1) % 3] };
        saveProgress(progress);
        render();
      }

      function render() {
        const track = plan.tracks.find((t) => t.id === activeTrackId);
        const overall = calculateOverallProgress(plan.tracks, progress);
        const next = getNextModule(plan.tracks, progress);
        const mod = activeModule(track, progress);

        document.getElementById("app").innerHTML = `
          <header class="masthead">
            <div>
              <p class="kicker">Career Transition Brief · Demo 02</p>
              <h1>${escapeHtml(plan.persona.headline)}</h1>
            </div>
            <div class="meta">
              <div>Issue № 01</div>
              <div><a href="index.html">选型</a> · <a href="../index.html">正式版</a></div>
            </div>
          </header>

          <p class="lede">${escapeHtml(plan.persona.positioning)}</p>

          <div class="columns">
            <section class="main paper">
              <p class="kicker">Learning Tracks</p>
              <h2>${escapeHtml(track.title)}</h2>
              <p style="color:var(--muted);margin-top:0">${escapeHtml(track.outcome)}</p>
              <div class="track-nav">
                ${plan.tracks.map((t) => `
                  <button class="${t.id === activeTrackId ? "is-active" : ""}" data-track="${t.id}">
                    ${escapeHtml(t.title.split("与")[0])} ${calculateTrackProgress(t, progress)}%
                  </button>
                `).join("")}
              </div>
              ${track.modules.map((m) => {
                const st = progress[moduleKey(track.id, m.id)] || "todo";
                return `
                  <article class="module-card">
                    <div>
                      <h3>${escapeHtml(m.title)}</h3>
                      <p>${escapeHtml(m.task)}</p>
                    </div>
                    <button class="pill ${st}" data-track="${track.id}" data-module="${m.id}">${statusLabels[st]}</button>
                  </article>
                `;
              }).join("")}
            </section>

            <aside class="sidebar">
              <div class="paper" style="margin-bottom:20px">
                <p class="kicker">Progress</p>
                <div class="progress-ring">${overall}%</div>
                <p style="margin:0;color:var(--muted);font-size:0.92rem">
                  下一步：<strong style="color:var(--ink)">${next ? escapeHtml(next.title) : "进入作品集复盘"}</strong>
                </p>
              </div>
              <div class="paper">
                <p class="kicker">Target Roles</p>
                <ul class="role-list">
                  ${plan.persona.targetRoles.map((r) => `<li>${escapeHtml(r)}</li>`).join("")}
                </ul>
              </div>
            </aside>
          </div>

          <section class="paper essay">
            <p class="kicker">Reflection · ${escapeHtml(track.title)}</p>
            <h2>${escapeHtml(mod.title)}</h2>
            <p style="color:var(--muted)">${escapeHtml(mod.feedbackPrompt)}</p>
            <textarea id="reflection">${escapeHtml(reflection)}</textarea>
            <div class="essay-actions">
              <button class="btn" id="score">生成编辑评语</button>
              <button class="btn ghost" id="reset">重置进度</button>
            </div>
            ${feedback ? `<div class="review"><strong>${feedback.score} 分</strong> — ${escapeHtml(feedback.message)}</div>` : ""}
          </section>
        `;

        bind();
      }

      function bind() {
        const root = document.getElementById("app");
        root.querySelectorAll("[data-track]").forEach((btn) => {
          if (btn.classList.contains("pill")) return;
          btn.onclick = () => { activeTrackId = btn.dataset.track; reflection = ""; feedback = null; render(); };
        });
        root.querySelectorAll(".pill").forEach((btn) => {
          btn.onclick = () => cycleStatus(btn.dataset.track, btn.dataset.module);
        });
        root.querySelector("#reflection").oninput = (e) => { reflection = e.target.value; };
        root.querySelector("#score").onclick = () => {
          const track = plan.tracks.find((t) => t.id === activeTrackId);
          feedback = scoreReflection(reflection, activeModule(track, progress).keywords);
          render();
        };
        root.querySelector("#reset").onclick = () => {
          progress = {}; reflection = ""; feedback = null; saveProgress(progress); render();
        };
      }

      loadPlan().then((data) => { plan = data; activeTrackId = plan.tracks[0].id; render(); });
    </script>
  </body>
</html>
