<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Demo 03 · Bento Command</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@500;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
    <style>
      :root {
        --bg: #111318;
        --card: #1a1e28;
        --card-hover: #222836;
        --ink: #f2f4f8;
        --muted: #8b93a7;
        --coral: #ff6b4a;
        --violet: #8b9cff;
        --mint: #5ee4a8;
        --radius: 20px;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        background:
          radial-gradient(ellipse 60% 40% at 10% 0%, rgba(255, 107, 74, 0.15), transparent),
          radial-gradient(ellipse 50% 35% at 90% 10%, rgba(139, 156, 255, 0.12), transparent),
          var(--bg);
        color: var(--ink);
        font-family: "DM Sans", system-ui, sans-serif;
        min-height: 100vh;
      }
      .wrap { max-width: 1200px; margin: 0 auto; padding: 28px 20px 64px; }
      .top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 24px;
        flex-wrap: wrap;
        gap: 12px;
      }
      .brand {
        font-family: "Syne", sans-serif;
        font-weight: 700;
        font-size: 1.1rem;
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .brand span {
        width: 36px; height: 36px;
        border-radius: 12px;
        background: linear-gradient(135deg, var(--coral), var(--violet));
        display: grid; place-items: center;
        font-size: 0.75rem;
      }
      .links a {
        color: var(--muted);
        text-decoration: none;
        font-size: 0.88rem;
        margin-left: 14px;
      }
      .links a:hover { color: var(--ink); }
      .bento {
        display: grid;
        grid-template-columns: repeat(12, 1fr);
        gap: 14px;
      }
      .cell {
        background: var(--card);
        border: 1px solid rgba(255, 255, 255, 0.06);
        border-radius: var(--radius);
        padding: 20px 22px;
      }
      .hero-cell { grid-column: span 7; }
      .progress-cell { grid-column: span 5; }
      .tracks-cell { grid-column: span 4; }
      .modules-cell { grid-column: span 5; }
      .reflect-cell { grid-column: span 3; }
      @media (max-width: 960px) {
        .hero-cell, .progress-cell, .tracks-cell, .modules-cell, .reflect-cell { grid-column: span 12; }
      }
      .label {
        font-size: 0.7rem;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--muted);
        margin-bottom: 8px;
      }
      h1 {
        font-family: "Syne", sans-serif;
        font-size: clamp(1.5rem, 3vw, 2.2rem);
        margin: 0 0 10px;
        line-height: 1.15;
      }
      .hero-cell p { margin: 0; color: var(--muted); font-size: 0.95rem; }
      .big-num {
        font-family: "Syne", sans-serif;
        font-size: 3.5rem;
        font-weight: 700;
        line-height: 1;
        background: linear-gradient(135deg, var(--coral), var(--violet));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
      .bar-track {
        height: 8px;
        background: rgba(255, 255, 255, 0.08);
        border-radius: 999px;
        overflow: hidden;
        margin: 14px 0;
      }
      .bar-track span {
        display: block;
        height: 100%;
        background: linear-gradient(90deg, var(--coral), var(--violet));
        border-radius: 999px;
      }
      .track-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        width: 100%;
        text-align: left;
        background: transparent;
        border: none;
        color: var(--muted);
        padding: 12px 10px;
        border-radius: 12px;
        cursor: pointer;
        font: inherit;
        margin-bottom: 4px;
      }
      .track-item:hover { background: var(--card-hover); color: var(--ink); }
      .track-item.is-active {
        background: rgba(255, 107, 74, 0.12);
        color: var(--ink);
      }
      .track-item strong { color: var(--coral); font-size: 0.85rem; }
      .mod {
        padding: 14px;
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.03);
        margin-bottom: 10px;
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 10px;
        align-items: start;
      }
      .mod h3 { margin: 0 0 4px; font-size: 0.95rem; }
      .mod p { margin: 0; color: var(--muted); font-size: 0.82rem; }
      .chip {
        font-size: 0.72rem;
        padding: 6px 10px;
        border-radius: 999px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        background: transparent;
        color: var(--muted);
        cursor: pointer;
        white-space: nowrap;
      }
      .chip.done { background: var(--mint); color: #0a1210; border-color: var(--mint); }
      .chip.doing { border-color: var(--coral); color: var(--coral); }
      textarea {
        width: 100%;
        min-height: 100px;
        background: rgba(0, 0, 0, 0.25);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 12px;
        color: var(--ink);
        font: inherit;
        font-size: 0.85rem;
        padding: 12px;
        resize: vertical;
      }
      .btn-row { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
      .btn {
        font-size: 0.78rem;
        font-weight: 600;
        padding: 8px 14px;
        border-radius: 999px;
        border: none;
        cursor: pointer;
        background: var(--coral);
        color: white;
      }
      .btn.ghost { background: transparent; border: 1px solid rgba(255,255,255,0.12); color: var(--muted); }
      .score-box {
        margin-top: 12px;
        padding: 12px;
        border-radius: 12px;
        background: rgba(139, 156, 255, 0.1);
        font-size: 0.82rem;
        color: var(--muted);
      }
      .score-box strong { color: var(--violet); }
    </style>
  </head>
  <body>
    <div class="wrap" id="app"></div>
    <script type="module">
      import {
        loadPlan, loadProgress, saveProgress, escapeHtml,
        calculateOverallProgress, calculateTrackProgress, getNextModule,
        moduleKey, statusLabels, scoreReflection, activeModule,
      } from "./demo-core.mjs";

      let plan, activeTrackId, progress = loadProgress(), reflection = "", feedback = null;

      function cycleStatus(trackId, moduleId) {
        const key = moduleKey(trackId, moduleId);
        const cycle = ["todo", "doing", "done"];
        progress = { ...progress, [key]: cycle[(cycle.indexOf(progress[key] || "todo") + 1) % 3] };
        saveProgress(progress);
        render();
      }

      function render() {
        const track = plan.tracks.find((t) => t.id === activeTrackId);
        const overall = calculateOverallProgress(plan.tracks, progress);
        const trackPct = calculateTrackProgress(track, progress);
        const next = getNextModule(plan.tracks, progress);
        const mod = activeModule(track, progress);

        document.getElementById("app").innerHTML = `
          <div class="top">
            <div class="brand"><span>W3</span> Bento Command · Demo 03</div>
            <div class="links">
              <a href="index.html">选型</a>
              <a href="../index.html">正式版</a>
            </div>
          </div>

          <div class="bento">
            <div class="cell hero-cell">
              <div class="label">Career OS</div>
              <h1>${escapeHtml(plan.persona.headline)}</h1>
              <p>${escapeHtml(plan.persona.positioning)}</p>
            </div>
            <div class="cell progress-cell">
              <div class="label">Overall</div>
              <div class="big-num">${overall}%</div>
              <div class="bar-track"><span style="width:${overall}%"></span></div>
              <p style="margin:0;color:var(--muted);font-size:0.88rem">
                下一步 · <strong style="color:var(--ink)">${next ? escapeHtml(next.title) : "作品集"}</strong>
              </p>
            </div>

            <div class="cell tracks-cell">
              <div class="label">Tracks</div>
              ${plan.tracks.map((t) => `
                <button class="track-item ${t.id === activeTrackId ? "is-active" : ""}" data-track="${t.id}">
                  <span>${escapeHtml(t.title)}</span>
                  <strong>${calculateTrackProgress(t, progress)}%</strong>
                </button>
              `).join("")}
            </div>

            <div class="cell modules-cell">
              <div class="label">${escapeHtml(track.title)} · ${trackPct}%</div>
              ${track.modules.map((m) => {
                const st = progress[moduleKey(track.id, m.id)] || "todo";
                return `
                  <div class="mod">
                    <div>
                      <h3>${escapeHtml(m.title)}</h3>
                      <p>${escapeHtml(m.task)}</p>
                    </div>
                    <button class="chip ${st}" data-track="${track.id}" data-module="${m.id}">${statusLabels[st]}</button>
                  </div>
                `;
              }).join("")}
            </div>

            <div class="cell reflect-cell">
              <div class="label">Reflect</div>
              <p style="margin:0 0 8px;font-size:0.88rem;font-weight:600">${escapeHtml(mod.title)}</p>
              <textarea id="reflection">${escapeHtml(reflection)}</textarea>
              <div class="btn-row">
                <button class="btn" id="score">评分</button>
                <button class="btn ghost" id="reset">重置</button>
              </div>
              ${feedback ? `<div class="score-box"><strong>${feedback.score}</strong> · ${escapeHtml(feedback.message)}</div>` : ""}
            </div>
          </div>
        `;
        bind();
      }

      function bind() {
        const root = document.getElementById("app");
        root.querySelectorAll(".track-item").forEach((btn) => {
          btn.onclick = () => { activeTrackId = btn.dataset.track; reflection = ""; feedback = null; render(); };
        });
        root.querySelectorAll(".chip").forEach((btn) => {
          btn.onclick = () => cycleStatus(btn.dataset.track, btn.dataset.module);
        });
        root.querySelector("#reflection").oninput = (e) => { reflection = e.target.value; };
        root.querySelector("#score").onclick = () => {
          const track = plan.tracks.find((t) => t.id === activeTrackId);
          feedback = scoreReflection(reflection, activeModule(track, progress).keywords);
          render();
        };
        root.querySelector("#reset").onclick = () => {
          progress = {}; reflection = ""; feedback = null; saveProgress(progress); render();
        };
      }

      loadPlan().then((data) => { plan = data; activeTrackId = plan.tracks[0].id; render(); });
    </script>
  </body>
</html>
